<!DOCTYPE html>  
<html lang="en">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>AutoSOAP</title>  
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">  
    <style>  
        body {  
            font-family: 'Roboto', sans-serif;  
            background-color: #f0f4f8;  
            color: #333;  
            margin: 0;  
            padding: 20px;  
            display: flex;  
            justify-content: center;  
            align-items: center;  
            height: 100vh;  
        }  
        .container {  
            max-width: 500px;  
            width: 100%;  
            padding: 20px;  
            background-color: #fff;  
            border-radius: 10px;  
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);  
            text-align: center;  
        }  
        .header {  
            margin-bottom: 20px;  
        }  
        .header h1 {  
            color: #3a6ea5;  
        }  
        .image-container {  
            margin-bottom: 20px;  
        }  
        .image-container img {  
            max-width: 100%;  
            border-radius: 10px;  
        }  
        .button {  
            display: inline-block;  
            padding: 10px 20px;  
            background-color: #007bff;  
            color: #fff;  
            text-align: center;  
            border-radius: 5px;  
            text-decoration: none;  
            border: none;  
            cursor: pointer;  
            transition: background-color 0.3s;  
        }  
        .button:hover {  
            background-color: #0056b3;  
        }  
    </style>  
</head>  
<body>  
    <div class="container">  
        <div class="header">  
            <h1>Welcome to AutoSOAP</h1>  
        </div>  
        <div class="image-container">  
            <img src="{{ url_for('static', filename='soap.jpg') }}" alt="Descriptive Alt Text">  
        </div>  
        <form action="{{ url_for('start_recording') }}" method="post">  
            <button type="submit" class="button">Start Recording</button>  
        </form>  
    </div>  
</body>  
</html>
